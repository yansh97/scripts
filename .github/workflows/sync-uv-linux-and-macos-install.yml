name: Sync uv install script (Linux and macOS)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch install script
        run: |
          curl -fsSL https://astral.sh/uv/install.sh -o uv-install.sh
          chmod +x uv-install.sh
      - name: Commit if changed
        run: |
          git add uv-install.sh
      
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync uv install script (Linux and macOS)"
          git push
